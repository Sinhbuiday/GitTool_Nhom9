<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitTool - Nhom9</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>

    <header class="header">
        <div class="container">
            <h1>GitTool Nhom9</h1>
            <p class="subtitle">Full-Stack Web Application</p>
        </div>
    </header>

    <main class="main container">
        <section id="hero">
            <h2>Welcome to GitTool Nhom9</h2>
            <p>This is the frontend entry point. Connect it to the backend API running at
                <code>http://localhost:5000/api</code>.</p>
            <button id="fetchUsersBtn" class="btn">Load Users from API</button>
        </section>

        <section id="users-section">
            <h3>Users</h3>
            <ul id="users-list">
                <!-- Users will be rendered here by main.js -->
            </ul>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Nhom9. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitTool - Nhom9</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>

    <header class="header">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h1>GitTool Nhom9</h1>
                <p class="subtitle">Full-Stack Web Application</p>
            </div>
            <nav>
                <ul style="list-style: none; display: flex; gap: 1.5rem;">
                    <li><a href="index.html" style="color: white; text-decoration: none; font-weight: 700;">Home</a>
                    </li>
                    <li><a href="product.html"
                            style="color: white; text-decoration: none; font-weight: 500;">Products</a></li>
                    <li><a href="category.html"
                            style="color: white; text-decoration: none; font-weight: 500;">Categories</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main container">
        <section id="hero">
            <h2>Welcome to GitTool Nhom9</h2>
            <p>This is the frontend entry point. Connect it to the backend API running at
                <code>http://localhost:5000/api</code>.
            </p>
            <button id="fetchUsersBtn" class="btn">Load Users from API</button>
            <button id="showAddBookBtn" class="btn" style="margin-left:1rem;">Add Book</button>
        </section>

        <!-- Container that holds add-book section and book list; hidden by default -->
        <div id="addBookContainer" style="display:none;">
            <section id="add-book-section" class="card">
                <h3>Add New Book</h3>
                <form id="addBookForm">
                    <div class="form-group">
                        <label for="title">Title *</label>
                        <input type="text" id="title" name="title" required />
                    </div>
                    <div class="form-group">
                        <label for="author">Author *</label>
                        <input type="text" id="author" name="author" required />
                    </div>
                    <div class="form-group">
                        <label for="isbn">ISBN</label>
                        <input type="text" id="isbn" name="isbn" />
                    </div>
                    <div class="form-group">
                        <label for="publisher">Publisher</label>
                        <input type="text" id="publisher" name="publisher" />
                    </div>
                    <div class="form-group">
                        <label for="year">Year</label>
                        <input type="number" id="year" name="year" />
                    </div>
                    <div class="form-group">
                        <label for="category">Category</label>
                        <input type="text" id="category" name="category" />
                    </div>
                    <div class="form-group">
                        <label for="price">Price</label>
                        <input type="number" step="0.01" id="price" name="price" />
                    </div>
                    <button type="submit" class="btn">Add Book</button>
                    <p id="form-message" class="message"></p>
                </form>
            </section>

            <!-- Book list display -->
            <section id="books-section">
                <h3>Books</h3>
                <ul id="books-list">
                    <!-- Books will appear here -->
                </ul>
            </section>
        </div>

    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Nhom9. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>

</html>

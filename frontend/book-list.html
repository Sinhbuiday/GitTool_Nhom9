<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Danh sách sách</title>
    <link rel="stylesheet" href="css/book-list.css">
</head>
<body>
  <div class="container">
    <div class="title">Danh sách sách</div>

    <div class="search">
      <label for="search">Tìm kiếm</label>
      <input id="search" type="text" placeholder="Nhập từ khóa (ID, tên, tác giả, thể loại, trạng thái)">
    </div>

    <table id="bookTable">
      <thead>
        <tr>
          <th style="width:80px">ID</th>
          <th>Tên sách</th>
          <th>Tác giả</th>
          <th>Thể loại</th>
          <th style="width:160px">Trạng thái</th>
        </tr>
      </thead>
      <tbody>
      </tbody>
    </table>

    <div id="empty" class="empty">Không có kết quả phù hợp</div>
  </div>

  <script>
    function normalizeText(s) {
      return s.toLowerCase().normalize('NFD').replace(/\p{Diacritic}/gu, '');
    }
    const input = document.getElementById('search');
    const tbody = document.querySelector('#bookTable tbody');
    const empty = document.getElementById('empty');
    function filter() {
      const term = normalizeText(input.value.trim());
      let visible = 0;
      Array.from(tbody.rows).forEach(row => {
        const text = normalizeText(row.innerText);
        const show = term === '' || text.includes(term);
        row.style.display = show ? '' : 'none';
        if (show) visible++;
      });
      empty.style.display = visible === 0 ? 'block' : 'none';
    }
    input.addEventListener('input', filter);
  </script>
  <script src="js/book-list.js" defer></script>
</body>
</html>
